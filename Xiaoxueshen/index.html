<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
    <title>🌸 口算闯关 · 红花小天使</title>
    <style>
        :root {
            --bg: #fdf6f0;
            --card-bg: #ffffff;
            --primary: #ff8c42;
            --primary-hover: #ff7733;
            --success: #6bcb77;
            --danger: #ff6b6b;
            --text: #4a3728;
            --text-light: #8b7355;
            --border: #ffe0c0;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
            --radius: 30px;
            --key-radius: 18px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', 'KaiTi', '楷体', sans-serif;
            background: radial-gradient(circle at 20% 30%, #fff4e6 0%, #ffe8d6 30%, #fde2e4 70%, #fef3c7 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            position: relative;
            overflow-x: hidden;
        }
        .bg-decoration {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            font-size: 60px;
            opacity: 0.16;
            animation: floatAround 20s infinite alternate ease-in-out;
        }
        .bg-decoration:nth-child(1) { top: 5%; left: 5%; }
        .bg-decoration:nth-child(2) { bottom: 8%; right: 5%; font-size: 70px; animation-delay: -7s; }
        .bg-decoration:nth-child(3) { top: 15%; right: 10%; font-size: 45px; animation-delay: -13s; }
        .bg-decoration:nth-child(4) { bottom: 18%; left: 8%; font-size: 55px; animation-delay: -3s; }
        @keyframes floatAround {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(30px, -25px) rotate(8deg) scale(1.15); }
        }
        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
        }
        .main-card {
            background: var(--card-bg);
            border-radius: 28px;
            box-shadow: var(--shadow), 0 0 0 6px rgba(255, 200, 150, 0.22);
            padding: 18px 14px 16px;
            text-align: center;
            border: 3px solid #ffe7c7;
            transition: all 0.2s ease;
        }
        .title-block { margin-bottom: 6px; }
        .title {
            font-size: 26px;
            font-weight: 800;
            color: #ff8c42;
            text-shadow: 2px 2px 0 #ffe0b0;
            letter-spacing: 2px;
        }
        .title-emoji { font-size: 30px; animation: bounceEmoji 1.8s infinite ease-in-out; display: inline-block; }
        @keyframes bounceEmoji {
            0%,100%{ transform: translateY(0); }
            40%{ transform: translateY(-10px); }
            60%{ transform: translateY(-3px); }
        }
        .subtitle { font-size: 13px; color: #c08a5c; margin-top: 2px; font-weight: 500; }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            gap: 6px;
            flex-wrap: wrap;
        }
        .badge {
            background: #fff6ed;
            border-radius: 18px;
            padding: 5px 10px;
            font-weight: 700;
            color: #c07a4b;
            border: 2px solid #ffe0c0;
            font-size: 13px;
        }
        .progress-wrap {
            margin: 0 0 6px;
            background: #f0e6d2;
            border-radius: 14px;
            height: 10px;
            overflow: hidden;
            border: 2px solid #ffe0c0;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ffb347, #ff8c42);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 14px;
        }
        .stats-row {
            display: flex;
            gap: 5px;
            margin-bottom: 6px;
        }
        .stat-item {
            background: #fef9f4;
            border-radius: 16px;
            padding: 5px 4px;
            flex: 1;
            border: 2px dashed #ffdfc0;
        }
        .stat-value { font-size: 18px; font-weight: 800; color: #ff8c42; line-height: 1.1; }
        .stat-value.timer-color { color: #f5a623; }
        .stat-label { font-size: 10px; color: #b5926e; margin-top: 1px; font-weight: 600; }
        .question-box {
            background: #fff9f2;
            border-radius: 24px;
            padding: 14px 10px;
            margin: 6px 0 8px;
            border: 3px solid #ffe7c7;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.02);
        }
        .question-box.correct-flash {
            border-color: #6bcb77 !important;
            background: #f2fdf3 !important;
            animation: popBounce 0.5s ease-out;
        }
        .question-box.wrong-flash {
            border-color: #ff6b6b !important;
            background: #fff4f4 !important;
            animation: shakeX 0.5s ease-out;
        }
        @keyframes popBounce {
            0%{ transform: scale(1); } 30%{ transform: scale(1.03); } 70%{ transform: scale(0.98); } 100%{ transform: scale(1); }
        }
        @keyframes shakeX {
            0%,100%{ transform: translateX(0); } 20%{ transform: translateX(-7px); } 40%{ transform: translateX(7px); } 60%{ transform: translateX(-5px); } 80%{ transform: translateX(3px); }
        }
        .question-label { font-size: 13px; color: #cc9f7a; margin-bottom: 4px; font-weight: 600; }
        .expression {
            font-size: 30px;
            font-weight: 900;
            color: #4a3728;
            letter-spacing: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 2px;
            line-height: 1.2;
        }
        .operator, .op-small { color: #ff8c42; margin: 0 3px; }
        .equals-sign { color: #f5a623; margin: 0 3px; }
        .question-mark { color: #a0aec0; }

        .answer-display {
            background: #fffefb;
            border: 3px solid #ffe0c0;
            border-radius: 18px;
            padding: 8px 12px;
            margin: 6px 0;
            font-size: 28px;
            font-weight: 900;
            color: #4a3728;
            min-height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 3px;
            transition: all 0.2s;
        }
        .placeholder-text { color: #e0c8b0; font-size: 17px; font-weight: 500; }

        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin: 6px 0 4px;
        }
        .numpad-key {
            background: #fff9f2;
            border: 3px solid #ffe0c0;
            border-radius: 16px;
            padding: 14px 6px;
            font-size: 24px;
            font-weight: 800;
            color: #4a3728;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            min-height: 50px;
        }
        .numpad-key:hover { background: #ffe8d0; border-color: #ffcc99; }
        .numpad-key:active { background: #ffcc99; transform: scale(0.94); border-color: #ffb380; }
        .key-delete {
            background: #ffe0e0;
            border-color: #ffc0c0;
            color: #d9534f;
            font-size: 20px;
        }
        .key-delete:active { background: #ffc0c0; }
        .key-submit {
            background: linear-gradient(135deg, #6bcb77 0%, #4caf50 100%);
            border-color: #8fd19a;
            color: white;
            font-size: 22px;
            font-weight: 900;
        }
        .key-submit:active { background: #45a049; transform: scale(0.94); }

        .feedback { font-size: 14px; font-weight: 700; min-height: 20px; margin: 3px 0; }
        .feedback.correct-fb { color: #4caf50; }
        .feedback.wrong-fb { color: #f44336; }
        .hint { font-size: 11px; color: #c0a080; margin-top: 2px; }

        .big-btn {
            background: #ff8c42;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 14px 30px;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255,140,66,0.4);
            font-family: inherit;
            transition: 0.2s;
            margin: 4px;
        }
        .big-btn:active { transform: scale(0.95); }
        .secondary-btn { background: #ffe0c0; color: #a96b3e; border: 2px solid #ffcc99; }
        .result-stats { font-size: 16px; line-height: 1.6; color: #4a3728; }

        @media (max-width: 380px) {
            .expression { font-size: 26px; }
            .numpad-key { font-size: 22px; padding: 12px 4px; min-height: 44px; }
            .answer-display { font-size: 24px; min-height: 36px; }
            .title { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="bg-decoration">⭐</div>
    <div class="bg-decoration">🐼</div>
    <div class="bg-decoration">🌸</div>
    <div class="bg-decoration">🧸</div>
    <div class="container">
        <div class="main-card" id="mainCard"></div>
    </div>
    <script>
        (function() {
            const mainCard = document.getElementById('mainCard');
            const TOTAL_QUESTIONS = 100;
            const THREE_NUMBER_RATIO = 0.05;
            let currentMode = 'mixed';
            let level = 1;
            let questions = [];
            let currentIndex = 0;
            let currentAnswer = null;
            let currentQuestionObj = null;
            let score = 0;
            let timerSeconds = 0;
            let timerInterval = null;
            let isTimerActive = false;
            let gameActive = false;
            let attempts = 0;
            let wrongBook = [];
            let userInput = '';
            let currentAudio = null;

            // ========== WAV音频播放系统 ==========
            const audioBasePath = 'sounds/';

            const audioFiles = {
                correct: ['correct1.wav', 'correct2.wav', 'correct3.wav'],
                wrong: ['wrong1.wav', 'wrong2.wav', 'wrong3.wav'],
                praise100: ['praise1.wav'],
                praise95: ['praise2.wav'],
                praise90: ['praise3.wav'],
                praiseFail: ['praise4.wav'],
                wrongbookEnter: ['wrongbook1.wav'],
                wrongbookClear: ['wrongbook2.wav'],
                wrongbookCorrect: ['wrongbook3.wav']
            };

            function playAudio(category) {
                if (currentAudio) {
                    currentAudio.pause();
                    currentAudio = null;
                }
                
                const files = audioFiles[category];
                if (!files || files.length === 0) return;
                
                const randomFile = files[Math.floor(Math.random() * files.length)];
                const audioPath = audioBasePath + randomFile;
                
                currentAudio = new Audio(audioPath);
                currentAudio.play().catch(err => {
                    console.log('WAV音频播放失败:', err.message);
                    fallbackToTTS(category);
                });
            }

            function fallbackToTTS(category) {
                const messages = {
                    correct: '答对啦！你真棒！',
                    wrong: '再试一次吧，你可以的！',
                    praise100: '满分小天才！太完美了！',
                    praise95: '非常棒！差一点就满分了！',
                    praise90: '真厉害！顺利过关！',
                    praiseFail: '不要气馁，再试一次吧！',
                    wrongbookEnter: '来消灭错题吧！',
                    wrongbookClear: '错题本清空啦，你太厉害了！',
                    wrongbookCorrect: '答对了！这道题从错题本移除了！'
                };
                const text = messages[category];
                if (text && 'speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'zh-CN';
                    utterance.rate = 1.0;
                    utterance.pitch = 1.4;
                    window.speechSynthesis.cancel();
                    window.speechSynthesis.speak(utterance);
                }
            }

            function stopAllAudio() {
                if (currentAudio) {
                    currentAudio.pause();
                    currentAudio = null;
                }
                if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            }

            // ========== 工具函数 ==========
            function randomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

            function generateTwoNumberQuestion(mode) {
                let num1, num2, answer, opSymbol;
                if (mode === 'add') {
                    num1 = randomInt(1, 99);
                    const maxSecond = Math.min(99, 100 - num1);
                    num2 = maxSecond < 1 ? randomInt(1, 100 - num1) : randomInt(1, maxSecond);
                    answer = num1 + num2;
                    opSymbol = '+';
                } else {
                    num1 = randomInt(2, 100);
                    num2 = randomInt(1, num1);
                    answer = num1 - num2;
                    opSymbol = '−';
                }
                return { text: `${num1} ${opSymbol} ${num2} = ?`, answer, mode, type: 'two', detail: { num1, num2, op: opSymbol } };
            }

            function generateThreeNumberQuestion() {
                const type = Math.random() < 0.5 ? 'add_sub' : 'sub_add';
                let a, b, c, answer, text, op1, op2;
                if (type === 'add_sub') {
                    a = randomInt(1, 50);
                    b = randomInt(1, 50);
                    c = randomInt(1, Math.min(a + b, 99));
                    answer = a + b - c;
                    text = `${a} + ${b} - ${c} = ?`;
                    op1 = '+'; op2 = '−';
                } else {
                    a = randomInt(2, 100);
                    b = randomInt(1, a);
                    const diff = a - b;
                    c = randomInt(1, 100 - diff);
                    answer = diff + c;
                    text = `${a} - ${b} + ${c} = ?`;
                    op1 = '−'; op2 = '+';
                }
                return { text, answer, mode: 'mixed', type: 'three', detail: { a, b, c, op1, op2 } };
            }

            function generateQuestion(mode) {
                const isThree = Math.random() < THREE_NUMBER_RATIO;
                if (isThree && mode === 'mixed') return generateThreeNumberQuestion();
                const actualMode = mode === 'mixed' ? (Math.random() < 0.5 ? 'add' : 'sub') : mode;
                return generateTwoNumberQuestion(actualMode);
            }

            function generateLevelQuestions(mode) {
                const qs = [];
                const threeCount = Math.round(TOTAL_QUESTIONS * THREE_NUMBER_RATIO);
                const indices = new Set();
                while (indices.size < threeCount) indices.add(randomInt(0, TOTAL_QUESTIONS - 1));
                for (let i = 0; i < TOTAL_QUESTIONS; i++) {
                    if (indices.has(i) && mode === 'mixed') qs.push(generateThreeNumberQuestion());
                    else {
                        const actualMode = mode === 'mixed' ? (Math.random() < 0.5 ? 'add' : 'sub') : mode;
                        qs.push(generateTwoNumberQuestion(actualMode));
                    }
                }
                return qs;
            }

            function modeText(mode) { return mode === 'mixed' ? '混合加减' : (mode === 'add' ? '加法' : '减法'); }

            // ========== 渲染界面 ==========
            function renderStartScreen() {
                const hasWrong = wrongBook.length > 0;
                mainCard.innerHTML = `
                <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
                  <div class="title-block"><span class="title-emoji">🐣</span><span class="title">口算闯关</span><span class="title-emoji">🐥</span></div>
                  <div class="subtitle">✨ 100以内加减法 · 第${level}关 ✨</div>
                  <div class="badge" style="font-size:15px;">📐 ${modeText(currentMode)}</div>
                  <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
                    <button class="mode-btn-small active" data-mode="mixed" style="padding:7px 12px;border-radius:20px;border:2px solid #ffe0c0;background:#ff8c42;color:#fff;font-weight:600;cursor:pointer;">🎨混合</button>
                    <button class="mode-btn-small" data-mode="add" style="padding:7px 12px;border-radius:20px;border:2px solid #ffe0c0;background:#fff;font-weight:600;cursor:pointer;">➕加法</button>
                    <button class="mode-btn-small" data-mode="sub" style="padding:7px 12px;border-radius:20px;border:2px solid #ffe0c0;background:#fff;font-weight:600;cursor:pointer;">➖减法</button>
                  </div>
                  <button class="big-btn" id="startBtn">🚀 开始闯关</button>
                  ${hasWrong ? `<button class="big-btn secondary-btn" id="wrongBookBtn">📒 错题本 (${wrongBook.length}题)</button>` : ''}
                  <div class="hint">共100题 · 每题1分 · 3×4数字键盘</div>
                </div>`;
                document.querySelectorAll('.mode-btn-small').forEach(btn => {
                    btn.addEventListener('click', function() {
                        currentMode = this.dataset.mode;
                        document.querySelectorAll('.mode-btn-small').forEach(b => { b.style.background = '#fff'; b.style.color = '#000'; });
                        this.style.background = '#ff8c42'; this.style.color = '#fff';
                    });
                });
                document.getElementById('startBtn').addEventListener('click', startGame);
                if (hasWrong) document.getElementById('wrongBookBtn').addEventListener('click', enterWrongPractice);
            }

            function renderGameScreen() {
                const q = questions[currentIndex];
                currentQuestionObj = q;
                currentAnswer = q.answer;
                attempts = 0;
                userInput = '';
                const progress = Math.floor((currentIndex / TOTAL_QUESTIONS) * 100);
                mainCard.innerHTML = `
                <div class="title-block"><span class="title-emoji">📝</span><span class="title">第${level}关</span></div>
                <div class="info-row">
                  <span class="badge">${modeText(currentMode)}</span>
                  <span class="badge" style="background:#ffe7a0;border-color:#ffd700;">第${currentIndex+1}/${TOTAL_QUESTIONS}题</span>
                </div>
                <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:${progress}%;"></div></div>
                <div class="stats-row">
                  <div class="stat-item"><div class="stat-value" id="scoreDisplay">${score}</div><div class="stat-label">⭐得分</div></div>
                  <div class="stat-item"><div class="stat-value timer-color" id="timerDisplay">00:00</div><div class="stat-label">⏱用时</div></div>
                  <div class="stat-item"><div class="stat-value" id="attemptDisplay">1/2</div><div class="stat-label">🔄机会</div></div>
                </div>
                <div class="question-box" id="questionBox">
                  <div class="question-label">👇 算一算 👇</div>
                  <div class="expression">${q.text}</div>
                </div>
                <div class="answer-display" id="answerDisplay">
                  <span class="placeholder-text">点击数字键输入答案</span>
                </div>
                <div class="numpad">
                  <button class="numpad-key" data-key="1">1</button>
                  <button class="numpad-key" data-key="2">2</button>
                  <button class="numpad-key" data-key="3">3</button>
                  <button class="numpad-key" data-key="4">4</button>
                  <button class="numpad-key" data-key="5">5</button>
                  <button class="numpad-key" data-key="6">6</button>
                  <button class="numpad-key" data-key="7">7</button>
                  <button class="numpad-key" data-key="8">8</button>
                  <button class="numpad-key" data-key="9">9</button>
                  <button class="numpad-key key-delete" data-key="delete">×</button>
                  <button class="numpad-key" data-key="0">0</button>
                  <button class="numpad-key key-submit" data-key="submit">✓</button>
                </div>
                <div class="feedback" id="feedbackMsg"></div>
                <div class="hint">点击数字键 · ×删除 · ✓确认</div>`;
                document.querySelectorAll('.numpad-key').forEach(key => {
                    key.addEventListener('click', function() {
                        const k = this.dataset.key;
                        if (k === 'delete') handleKeyPress('delete');
                        else if (k === 'submit') handleKeyPress('submit');
                        else handleKeyPress(k);
                    });
                });
                document.addEventListener('keydown', physicalKeyHandler);
                updateTimerDisplay();
                updateAnswerDisplay();
            }

            function renderResultScreen() {
                stopAllAudio();
                stopTimer();
                const totalSec = timerSeconds;
                const mins = Math.floor(totalSec / 60);
                const secs = totalSec % 60;
                let flowers = 2, message = '继续加油哟！', pass = false, audioCategory = 'praiseFail';
                
                if (score >= 100) { 
                    flowers = 10; message = '完美！满分小天才！'; pass = true; audioCategory = 'praise100'; 
                } else if (score >= 95) { 
                    flowers = 8; message = '非常棒！差一点就满分了！'; pass = true; audioCategory = 'praise95'; 
                } else if (score >= 90) { 
                    flowers = 5; message = '真厉害！顺利过关！'; pass = true; audioCategory = 'praise90'; 
                }
                
                const flowerIcons = '🌸'.repeat(flowers);
                mainCard.innerHTML = `
                <div style="display:flex;flex-direction:column;align-items:center;gap:14px;">
                  <div class="title-block"><span class="title-emoji">🏆</span><span class="title">闯关结果</span></div>
                  <div class="result-stats">
                    <p>📊 得分：<strong>${score}</strong> / ${TOTAL_QUESTIONS}</p>
                    <p>⏱️ 用时：${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}</p>
                    <p style="font-size:28px;">${flowerIcons}</p>
                    <p>🌺 获得小红花：<strong>${flowers} 朵</strong></p>
                    <p style="color:${pass?'#4caf50':'#f44336'};">${pass?'✅ 恭喜过关！':'❌ 未达到90分'}</p>
                    <p>${message}</p>
                  </div>
                  <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;">
                    ${pass?'<button class="big-btn" id="nextLevelBtn">🌟 挑战下一关</button>':''}
                    <button class="big-btn secondary-btn" id="retryBtn">🔄 重新闯关</button>
                    <button class="big-btn secondary-btn" id="homeBtn">🏠 返回主页</button>
                  </div>
                </div>`;
                if (pass) document.getElementById('nextLevelBtn').addEventListener('click', () => { level++; resetAndPrepare(); renderStartScreen(); });
                document.getElementById('retryBtn').addEventListener('click', () => { resetAndPrepare(); renderStartScreen(); });
                document.getElementById('homeBtn').addEventListener('click', () => { resetAndPrepare(); renderStartScreen(); });
                document.removeEventListener('keydown', physicalKeyHandler);
                playAudio(audioCategory);
            }

            function renderWrongPracticeScreen() {
                if (wrongBook.length === 0) { 
                    renderStartScreen(); 
                    playAudio('wrongbookClear');
                    return; 
                }
                const idx = randomInt(0, wrongBook.length - 1);
                const q = wrongBook[idx];
                currentQuestionObj = q;
                currentAnswer = q.answer;
                userInput = '';
                mainCard.innerHTML = `
                <div class="title-block"><span class="title-emoji">📒</span><span class="title">错题练习</span></div>
                <div class="badge" style="margin-bottom:6px;">还剩 ${wrongBook.length} 道错题</div>
                <div class="question-box"><div class="question-label">💪 再试一次</div><div class="expression">${q.text}</div></div>
                <div class="answer-display" id="answerDisplay"><span class="placeholder-text">点击数字键输入答案</span></div>
                <div class="numpad">
                  <button class="numpad-key" data-key="1">1</button>
                  <button class="numpad-key" data-key="2">2</button>
                  <button class="numpad-key" data-key="3">3</button>
                  <button class="numpad-key" data-key="4">4</button>
                  <button class="numpad-key" data-key="5">5</button>
                  <button class="numpad-key" data-key="6">6</button>
                  <button class="numpad-key" data-key="7">7</button>
                  <button class="numpad-key" data-key="8">8</button>
                  <button class="numpad-key" data-key="9">9</button>
                  <button class="numpad-key key-delete" data-key="delete">×</button>
                  <button class="numpad-key" data-key="0">0</button>
                  <button class="numpad-key key-submit" data-key="submit">✓</button>
                </div>
                <div class="feedback" id="feedbackMsg"></div>
                <button class="big-btn secondary-btn" id="exitWrongBtn" style="margin-top:4px;">↩️ 返回主页</button>`;
                document.querySelectorAll('.numpad-key').forEach(key => {
                    key.addEventListener('click', function() {
                        const k = this.dataset.key;
                        if (k === 'delete') handleKeyPress('delete');
                        else if (k === 'submit') handleWrongSubmit();
                        else handleKeyPress(k);
                    });
                });
                document.getElementById('exitWrongBtn').addEventListener('click', () => { stopAllAudio(); renderStartScreen(); });
                document.addEventListener('keydown', physicalKeyHandler);
                updateAnswerDisplay();
            }

            function updateAnswerDisplay() {
                const display = document.getElementById('answerDisplay');
                if (!display) return;
                display.innerHTML = userInput === '' ? '<span class="placeholder-text">点击数字键输入答案</span>' : userInput;
            }

            function handleKeyPress(key) {
                if (!gameActive && !document.getElementById('exitWrongBtn')) return;
                if (key === 'delete') { userInput = userInput.slice(0, -1); }
                else if (key === 'submit') {
                    if (document.getElementById('exitWrongBtn')) handleWrongSubmit();
                    else handleSubmit();
                    return;
                } else { if (userInput.length < 4) userInput += key; }
                updateAnswerDisplay();
            }

            function physicalKeyHandler(e) {
                if (e.key >= '0' && e.key <= '9') handleKeyPress(e.key);
                else if (e.key === 'Backspace' || e.key === 'Delete') { e.preventDefault(); handleKeyPress('delete'); }
                else if (e.key === 'Enter') { e.preventDefault(); handleKeyPress('submit'); }
            }

            function updateTimerDisplay() {
                const el = document.getElementById('timerDisplay');
                if (!el) return;
                const m = Math.floor(timerSeconds / 60);
                const s = timerSeconds % 60;
                el.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
            }
            function startTimer() { if (!isTimerActive) { isTimerActive = true; timerInterval = setInterval(() => { timerSeconds++; updateTimerDisplay(); }, 1000); } }
            function stopTimer() { if (isTimerActive) { clearInterval(timerInterval); isTimerActive = false; } }
            function resetTimer() { stopTimer(); timerSeconds = 0; updateTimerDisplay(); }

            function handleSubmit() {
                if (!gameActive || attempts >= 2) return;
                if (userInput === '') { document.getElementById('feedbackMsg').textContent = '🐣 请用数字键输入答案哟～'; return; }
                const userAnswer = parseInt(userInput, 10);
                const questionBox = document.getElementById('questionBox');
                const feedbackEl = document.getElementById('feedbackMsg');
                if (currentIndex === 0 && !isTimerActive) startTimer();
                const isCorrect = (userAnswer === currentAnswer);
                if (attempts === 0) {
                    if (isCorrect) {
                        score++;
                        feedbackEl.textContent = '✅ 正确！ +1分';
                        feedbackEl.className = 'feedback correct-fb';
                        questionBox.classList.add('correct-flash');
                        playAudio('correct');
                        updateScore();
                        moveToNextQuestion();
                    } else {
                        attempts = 1;
                        document.getElementById('attemptDisplay').textContent = '2/2';
                        feedbackEl.textContent = '🤔 不对哦，再试一次吧～';
                        feedbackEl.className = 'feedback wrong-fb';
                        questionBox.classList.add('wrong-flash');
                        playAudio('wrong');
                        userInput = '';
                        updateAnswerDisplay();
                        setTimeout(() => questionBox.classList.remove('wrong-flash'), 500);
                    }
                } else if (attempts === 1) {
                    if (isCorrect) {
                        feedbackEl.textContent = '👍 这次对啦，但不得分哟';
                        feedbackEl.className = 'feedback correct-fb';
                        questionBox.classList.add('correct-flash');
                        playAudio('correct');
                    } else {
                        feedbackEl.textContent = `😲 还是不对，答案是 ${currentAnswer}`;
                        feedbackEl.className = 'feedback wrong-fb';
                        questionBox.classList.add('wrong-flash');
                        playAudio('wrong');
                        addToWrongBook(currentQuestionObj);
                    }
                    moveToNextQuestion();
                }
            }

            function handleWrongSubmit() {
                if (userInput === '') { document.getElementById('feedbackMsg').textContent = '请用数字键输入答案～'; return; }
                const userAnswer = parseInt(userInput, 10);
                const feedbackEl = document.getElementById('feedbackMsg');
                const isCorrect = (userAnswer === currentAnswer);
                if (isCorrect) {
                    feedbackEl.textContent = '🎉 正确！移出错题本';
                    feedbackEl.className = 'feedback correct-fb';
                    playAudio('wrongbookCorrect');
                    const idx = wrongBook.findIndex(q => q.text === currentQuestionObj.text && q.answer === currentAnswer);
                    if (idx > -1) wrongBook.splice(idx, 1);
                    setTimeout(() => {
                        if (wrongBook.length === 0) { 
                            renderStartScreen(); 
                            playAudio('wrongbookClear');
                        } else {
                            renderWrongPracticeScreen();
                        }
                    }, 1000);
                } else {
                    feedbackEl.textContent = `❌ 答案是 ${currentAnswer}`;
                    feedbackEl.className = 'feedback wrong-fb';
                    playAudio('wrong');
                    setTimeout(() => renderWrongPracticeScreen(), 1000);
                }
            }

            function addToWrongBook(q) { 
                if (!wrongBook.some(w => w.text === q.text && w.answer === q.answer)) {
                    wrongBook.push({...q}); 
                }
            }

            function updateScore() {
                document.getElementById('scoreDisplay').textContent = score;
                document.getElementById('progressBar').style.width = Math.floor(((currentIndex + 1) / TOTAL_QUESTIONS) * 100) + '%';
            }

            function moveToNextQuestion() {
                const questionBox = document.getElementById('questionBox');
                setTimeout(() => {
                    if (questionBox) questionBox.classList.remove('correct-flash', 'wrong-flash');
                    currentIndex++;
                    userInput = '';
                    if (currentIndex >= TOTAL_QUESTIONS) { 
                        gameActive = false; 
                        stopTimer(); 
                        document.removeEventListener('keydown', physicalKeyHandler); 
                        renderResultScreen(); 
                    } else {
                        renderGameScreen();
                    }
                }, 1100);
            }

            function startGame() {
                stopAllAudio();
                resetTimer();
                score = 0;
                currentIndex = 0;
                userInput = '';
                questions = generateLevelQuestions(currentMode);
                gameActive = true;
                renderGameScreen();
            }

            function enterWrongPractice() { 
                stopAllAudio(); 
                gameActive = false; 
                stopTimer(); 
                document.removeEventListener('keydown', physicalKeyHandler); 
                renderWrongPracticeScreen(); 
                playAudio('wrongbookEnter');
            }

            function resetAndPrepare() {
                stopAllAudio();
                stopTimer();
                gameActive = false;
                score = 0;
                currentIndex = 0;
                timerSeconds = 0;
                questions = [];
                userInput = '';
                document.removeEventListener('keydown', physicalKeyHandler);
            }

            renderStartScreen();
            console.log('🌸 口算闯关·WAV语音版已启动！');
            console.log('📁 请确保 sounds 文件夹中有以下WAV文件：');
            console.log('   correct1~3.wav, wrong1~3.wav, praise1~4.wav, wrongbook1~3.wav');
        })();
    </script>
</body>
</html>
